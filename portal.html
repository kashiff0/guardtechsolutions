<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Staff Portal | Guard Tech Solutions</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" id="favicon-link" type="image/svg+xml" href="guard-tech-icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c1221;--navy2:#141f35;--navy3:#1c2d4a;
  --gold:#c8a84b;--gold2:#e2c06b;--gold-dim:rgba(200,168,75,.12);
  --white:#f4f6fb;--gray:#8a94a8;--light:#eef1f8;--line:rgba(0,0,0,.07);
  --green:#3ba776;--green-dim:rgba(59,167,118,.12);--red:#d9534f;--blue:#4a7bd0;
  --radius:12px;--ease:cubic-bezier(.4,0,.2,1);--t:.25s;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--navy);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}
.mono{font-variant-numeric:tabular-nums}

/* ============ LOGIN ============ */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#162340 100%);padding:24px;position:relative;overflow:hidden}
#login::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:52px 52px;pointer-events:none}
.login-card{position:relative;z-index:2;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(14px);
  border-radius:20px;padding:42px 38px;width:100%;max-width:420px}
.login-logo{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:6px}
.login-logo img{height:34px}
.login-logo canvas{height:96px;width:auto;display:block}
.login-eyebrow{text-align:center;font-size:.66rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:30px}
.role-toggle{display:flex;gap:8px;background:rgba(255,255,255,.05);padding:5px;border-radius:11px;margin-bottom:26px}
.role-toggle button{flex:1;padding:11px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:.85rem;font-weight:600;border-radius:8px;transition:all var(--t) var(--ease)}
.role-toggle button.active{background:var(--gold);color:var(--navy)}
.field{margin-bottom:16px}
.field label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px}
.field input,.field select{width:100%;padding:13px 15px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:10px;color:#fff;font-size:.92rem}
.field input::placeholder{color:rgba(255,255,255,.3)}
.field select option{background:var(--navy2);color:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:var(--gold);color:var(--navy);border:none;border-radius:10px;font-size:.92rem;font-weight:700;margin-top:8px;transition:background var(--t) var(--ease)}
.login-btn:hover{background:var(--gold2)}
.login-hint{text-align:center;font-size:.74rem;color:rgba(255,255,255,.4);margin-top:20px;line-height:1.7}
.login-hint code{color:var(--gold);background:rgba(200,168,75,.1);padding:2px 7px;border-radius:5px;font-size:.72rem}
.login-err{background:rgba(217,83,79,.15);border:1px solid rgba(217,83,79,.4);color:#ffb3b1;font-size:.8rem;padding:10px 13px;border-radius:9px;margin-bottom:16px;text-align:center}

/* ============ APP SHELL ============ */
#app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50}
.sb-logo{display:flex;align-items:center;gap:10px;padding:22px 22px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo img{height:30px}
.sb-logo canvas{height:48px;width:auto;display:block}
.sb-role{font-size:.6rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);padding:18px 22px 8px}
.sb-nav{flex:1;padding:0 12px}
.sb-nav button{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border:none;background:transparent;color:rgba(255,255,255,.62);font-size:.88rem;font-weight:500;border-radius:9px;margin-bottom:3px;text-align:left;transition:all var(--t) var(--ease)}
.sb-nav button:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-nav button.active{background:var(--gold-dim);color:var(--gold)}
.sb-nav button svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.sb-user{padding:16px 18px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:11px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.sb-user-meta{flex:1;min-width:0}
.sb-user-meta .nm{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-meta .rl{font-size:.7rem;color:rgba(255,255,255,.45)}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.4);padding:5px;border-radius:6px;display:flex}
.sb-logout:hover{color:var(--gold)}
.sb-logout svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}

.main{flex:1;margin-left:248px;min-height:100vh;background:var(--white)}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:0 36px;height:66px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar h1{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-.02em}
.topbar .clock{font-size:.82rem;color:var(--gray);font-weight:500}
.content{padding:32px 36px 60px}

/* cards & misc */
.grid{display:grid;gap:18px}
.stat-row{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px}
.kpi .lbl{font-size:.72rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--gray);margin-bottom:10px}
.kpi .val{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;line-height:1}
.kpi .val small{font-size:1rem;color:var(--gray);font-weight:600}
.kpi .sub{font-size:.76rem;color:var(--gray);margin-top:6px}
.kpi .val.gold{color:var(--gold)}.kpi .val.green{color:var(--green)}
.section-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;margin:34px 0 14px;display:flex;align-items:center;justify-content:space-between}
.section-title:first-child{margin-top:0}

/* clock widget */
.clock-card{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:18px;padding:34px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.clock-big{font-family:'Syne',sans-serif;font-size:3.2rem;font-weight:800;line-height:1;letter-spacing:-.02em}
.clock-status{font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;font-weight:600;margin-top:8px;display:inline-flex;align-items:center;gap:8px}
.clock-status .dot{width:9px;height:9px;border-radius:50%}
.dot.on{background:var(--green);box-shadow:0 0 0 4px rgba(59,167,118,.25);animation:pulse 2s infinite}
.dot.off{background:var(--gray)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.clock-meta{font-size:.82rem;color:rgba(255,255,255,.55);margin-top:6px}
.btn-clock{padding:18px 38px;border:none;border-radius:12px;font-size:1rem;font-weight:700;transition:all var(--t) var(--ease)}
.btn-clock.in{background:var(--gold);color:var(--navy)}.btn-clock.in:hover{background:var(--gold2);transform:translateY(-2px)}
.btn-clock.out{background:var(--red);color:#fff}.btn-clock.out:hover{filter:brightness(1.1);transform:translateY(-2px)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:.86rem}
th{text-align:left;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray);padding:11px 14px;border-bottom:1px solid var(--line)}
td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
.tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:600;padding:4px 11px;border-radius:999px}
.pill.green{background:var(--green-dim);color:var(--green)}
.pill.gray{background:var(--light);color:var(--gray)}
.pill.gold{background:var(--gold-dim);color:#9c8230}
.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* schedule */
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.sched-day{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;min-height:130px}
.sched-day h4{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--gray);margin-bottom:4px}
.sched-day .date{font-size:.7rem;color:var(--gray);margin-bottom:10px}
.sched-day.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.shift{background:var(--navy);color:#fff;border-radius:8px;padding:8px 9px;margin-bottom:7px;font-size:.74rem;position:relative}
.shift .tm{color:var(--gold);font-weight:700;font-size:.72rem}
.shift .st{color:rgba(255,255,255,.7);margin-top:2px}
.shift .who{color:rgba(255,255,255,.55);font-size:.68rem;margin-top:3px}
.shift .x{position:absolute;top:5px;right:6px;color:rgba(255,255,255,.4);font-size:.9rem;line-height:1;background:none;border:none;padding:2px}
.shift .x:hover{color:var(--red)}

/* CRM pipeline */
.pipe{display:grid;grid-template-columns:repeat(6,minmax(210px,1fr));gap:14px;overflow-x:auto;padding-bottom:8px}
.pipe-col{background:var(--light);border-radius:12px;padding:12px;min-width:210px}
.pipe-col h3{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;color:var(--navy)}
.pipe-col h3 .ct{background:#fff;color:var(--gray);border-radius:999px;padding:1px 9px;font-size:.7rem}
.pipe-col .total{font-size:.7rem;color:var(--gray);font-weight:600;margin-bottom:10px}
.lead{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:9px;cursor:grab;transition:box-shadow var(--t),transform var(--t)}
.lead:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.lead.dragging{opacity:.4}
.lead .co{font-weight:700;font-size:.86rem;line-height:1.3}
.lead .ct2{font-size:.76rem;color:var(--gray);margin-top:3px}
.lead .meta{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.lead .val{font-size:.78rem;font-weight:700;color:var(--green)}
.lead .tag{font-size:.66rem;color:var(--gray);background:var(--light);padding:2px 7px;border-radius:5px}
.pipe-col.drop{outline:2px dashed var(--gold);outline-offset:-2px}

/* CRM next-step on card */
.lead .next{margin-top:10px;padding-top:9px;border-top:1px dashed var(--line)}
.next-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.next-lbl{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray)}
.next-select{width:100%;font-size:.75rem;font-weight:600;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--light);color:var(--navy);cursor:pointer}
.next-select:focus{outline:none;border-color:var(--gold)}
.next-date{width:100%;font-size:.72rem;padding:5px 7px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--navy);margin-top:6px;cursor:pointer}
.next-date:focus{outline:none;border-color:var(--gold)}
.due{font-size:.62rem;font-weight:700;padding:3px 7px;border-radius:6px;white-space:nowrap;margin-left:auto}
.due.overdue{background:rgba(217,83,79,.14);color:var(--red)}
.due.today{background:var(--gold-dim);color:#9c8230}
.due.soon{background:var(--green-dim);color:var(--green)}
.due.none{background:var(--light);color:var(--gray)}

/* CRM action queue */
.queue{background:#fff;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:var(--radius);padding:14px 16px;margin-bottom:18px}
.queue h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.queue h3 .qcount{font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;color:var(--gray);background:var(--light);padding:2px 9px;border-radius:999px}
.q-item{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background var(--t)}
.q-item:hover{background:var(--light)}
.q-item+.q-item{border-top:1px solid var(--line)}
.q-main{flex:1;min-width:0}
.q-main strong{font-size:.85rem}
.q-step{display:block;font-size:.74rem;color:var(--gray);margin-top:1px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border:none;border-radius:9px;font-size:.84rem;font-weight:600;transition:all var(--t) var(--ease)}
.btn.primary{background:var(--navy);color:#fff}.btn.primary:hover{background:var(--navy3)}
.btn.gold{background:var(--gold);color:var(--navy)}.btn.gold:hover{background:var(--gold2)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}.btn.ghost:hover{border-color:var(--gold)}
.btn.sm{padding:7px 13px;font-size:.78rem}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(12,18,33,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow:auto;padding:28px}
.modal h2{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;margin-bottom:4px}
.modal .sub{font-size:.82rem;color:var(--gray);margin-bottom:20px}
.modal .field label{color:var(--navy);opacity:.7}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;padding:11px 13px;background:var(--white);border:1px solid var(--line);border-radius:9px;color:var(--navy);font-size:.88rem}
.modal .field input:focus,.modal .field select:focus,.modal .field textarea:focus{outline:none;border-color:var(--gold)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.lead-detail-row{display:flex;gap:8px;font-size:.84rem;padding:7px 0;border-bottom:1px solid var(--line)}
.lead-detail-row .k{color:var(--gray);width:90px;flex-shrink:0}
.note{background:var(--light);border-radius:8px;padding:9px 11px;font-size:.8rem;margin-bottom:7px}
.note .when{font-size:.68rem;color:var(--gray);margin-top:3px}

.empty{text-align:center;color:var(--gray);font-size:.85rem;padding:30px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;font-size:.85rem;font-weight:500;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .3s,transform .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.toast .ck{color:var(--gold);margin-right:7px}

/* sidebar scrim (mobile only) */
.scrim{display:none;position:fixed;inset:0;background:rgba(12,18,33,.5);z-index:45}
.scrim.show{display:block}

@media(max-width:880px){
  .sidebar{transform:translateX(-100%);transition:transform var(--t);box-shadow:0 0 40px rgba(0,0,0,.35)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamb{display:flex!important}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .sched-grid{grid-template-columns:1fr}
  .content{padding:20px 16px 64px}
  .topbar{padding:0 16px;height:60px}
  .topbar h1{font-size:1.1rem}
  .topbar .clock{display:none}
  /* tables scroll sideways instead of crushing */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl-wrap table{min-width:540px}
  /* kanban: swipe one column at a time, full-bleed to screen edges */
  .pipe{grid-auto-flow:column;grid-template-columns:none;grid-auto-columns:82%;scroll-snap-type:x mandatory;gap:12px;margin:0 -16px;padding:0 16px 10px}
  .pipe-col{scroll-snap-align:start;min-width:0}
  /* clock widget stacks, button goes full-width */
  .clock-card{padding:24px;flex-direction:column;align-items:stretch;text-align:center;gap:18px}
  .clock-big{font-size:2.6rem}
  .clock-status{justify-content:center}
  .btn-clock{width:100%;padding:18px}
  /* section headers let their action button wrap underneath */
  .section-title{flex-wrap:wrap;gap:8px;font-size:1rem}
  /* modals fit small screens */
  .modal{padding:22px;border-radius:14px}
  .modal-bg{padding:14px}
  /* iOS zooms in on focus when input text < 16px — force 16px */
  .field input,.field select,.field textarea,
  .modal .field input,.modal .field select,.modal .field textarea{font-size:16px}
  .next-select,.next-date{font-size:15px}
}
@media(min-width:881px){.scrim{display:none!important}}

@media(max-width:480px){
  .stat-row{grid-template-columns:1fr}
  .clock-big{font-size:2.2rem}
  .login-card{padding:32px 22px}
  .pipe{grid-auto-columns:90%}
}
.hamb{display:none;background:none;border:none;padding:6px}
.hamb svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2}

/* ============ CRM AGENT CHAT ============ */
#agentFab{position:fixed;right:24px;bottom:24px;z-index:60;display:none;align-items:center;gap:9px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:var(--navy);border:none;
  border-radius:999px;padding:13px 19px 13px 16px;font-size:.9rem;font-weight:700;
  box-shadow:0 8px 26px rgba(200,168,75,.4);transition:transform var(--t) var(--ease),box-shadow var(--t)}
#agentFab:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(200,168,75,.5)}
#agentFab svg{width:20px;height:20px;stroke:var(--navy);fill:none;stroke-width:2}
#agentFab.show{display:flex}
#agentPanel{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;z-index:70;
  background:var(--navy);color:#fff;display:flex;flex-direction:column;
  transform:translateX(105%);transition:transform .3s var(--ease);box-shadow:-8px 0 40px rgba(0,0,0,.4)}
#agentPanel.open{transform:translateX(0)}
.ag-head{display:flex;align-items:center;gap:11px;padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.ag-ava{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.ag-head .ag-t{font-weight:700;font-size:.96rem;font-family:'Syne',sans-serif}
.ag-head .ag-s{font-size:.7rem;color:var(--gray)}
.ag-x{margin-left:auto;background:none;border:none;color:var(--gray);font-size:1.5rem;line-height:1;padding:4px 8px}
.ag-x:hover{color:#fff}
.ag-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.ag-empty{color:var(--gray);font-size:.82rem;text-align:center;margin:auto 0;line-height:1.7}
.ag-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:14px}
.ag-chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#dfe5f0;
  font-size:.74rem;padding:7px 11px;border-radius:999px;transition:all var(--t)}
.ag-chip:hover{border-color:var(--gold);color:#fff}
.ag-row{display:flex;flex-direction:column;max-width:88%}
.ag-row.user{align-self:flex-end;align-items:flex-end}
.ag-row.bot{align-self:flex-start;align-items:flex-start}
.ag-bub{padding:10px 13px;border-radius:14px;font-size:.86rem;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
.ag-row.user .ag-bub{background:var(--gold);color:var(--navy);border-bottom-right-radius:5px;font-weight:500}
.ag-row.bot .ag-bub{background:var(--navy3);color:#eef1f8;border-bottom-left-radius:5px}
.ag-acts{display:flex;flex-direction:column;gap:4px;margin-top:7px}
.ag-act{font-size:.72rem;color:var(--gold2);display:flex;align-items:center;gap:6px}
.ag-act::before{content:'✓';font-size:.7rem}

<script>
/* ========================= DATA LAYER ========================= */
const K = {
  emp:'kmgts_employees', time:'kmgts_time', shifts:'kmgts_shifts', sites:'kmgts_sites',
  leads:'kmgts_leads', session:'kmgts_session', seeded:'kmgts_seeded_v2'
};
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};
const save=(k,v)=>{localStorage.setItem(k,JSON.stringify(v)); if(k===K.leads && cloudReady) cloudPush();};
const uid=()=>Math.random().toString(36).slice(2,9);

/* ===== Cloud CRM (Netlify Function + Blobs) — keeps leads synced across all devices.
   localStorage is the local cache; the cloud blob is the shared source of truth. ===== */
const CRM_API='/.netlify/functions/crm';
let cloudPw = localStorage.getItem('gts_pw') || null;
let cloudReady = false;
async function cloudGet(pw){
  try{
    const r = await fetch(CRM_API, { headers:{ 'x-gts-pw': pw } });
    if(r.status===200){ const d=await r.json(); return { ok:true, leads:Array.isArray(d.leads)?d.leads:[], role:d.role||'admin' }; }
    return { ok:false, status:r.status };
  }catch(e){ return { ok:false, err:String(e) }; }
}
let _pushTimer=null;
function cloudPush(){
  if(!cloudPw) return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>{
    fetch(CRM_API, { method:'POST', headers:{ 'x-gts-pw':cloudPw, 'content-type':'application/json' },
      body: JSON.stringify({ leads: load(K.leads, []) }) }).catch(()=>{});
  }, 600);
}
async function cloudPull(){
  if(!cloudPw) return false;
  const res = await cloudGet(cloudPw);
  if(res.ok){ localStorage.setItem(K.leads, JSON.stringify(res.leads)); return true; }
  return false;
}

/* ===== Cloud TIME-CLOCK (Netlify Function + Blobs) — real, multi-device, attributable
   punches that REPLACE Connecteam's clock. Server is the source of truth for employees /
   time entries / shifts / sites; localStorage mirrors it as a cache. If the function is
   unreachable we fall back to the local demo so the offline/file-open case still works. */
const TIME_API='/.netlify/functions/time';
let timeCloud=false;     // true once we've synced punches with the server
let empPin=null;         // current guard's PIN, kept in memory to re-auth punches/pulls

async function timeRoster(){           // public: names for the login dropdown
  try{ const r=await fetch(TIME_API+'?roster=1'); if(r.ok){ const d=await r.json(); return Array.isArray(d.roster)?d.roster:null; } }catch(e){}
  return null;
}
async function timeLogin(empId,pin){   // guard auth → own entries/shifts/sites
  try{ const r=await fetch(TIME_API,{method:'POST',headers:{'content-type':'application/json'},
       body:JSON.stringify({action:'login',empId,pin})});
    if(r.status===200) return {ok:true,...(await r.json())};
    return {ok:false,status:r.status};
  }catch(e){ return {ok:false,err:String(e)}; }
}
async function timePunch(type){        // guard clock in/out/break (server mutates, returns own entries)
  const loc=await getLoc();
  try{ const r=await fetch(TIME_API,{method:'POST',headers:{'content-type':'application/json'},
       body:JSON.stringify({action:'punch',empId:session.empId,pin:empPin,type,loc})});
    const d=await r.json().catch(()=>({}));
    if(r.status===200){ save(K.time,d.entries||[]); return {ok:true}; }
    return {ok:false,error:d.error||('http '+r.status),info:d};
  }catch(e){ return {ok:false,error:String(e)}; }
}
async function timeAdminGet(pw){       // admin: full snapshot
  try{ const r=await fetch(TIME_API,{headers:{'x-gts-pw':pw}});
    if(r.status===200) return {ok:true,data:await r.json()};
    return {ok:false,status:r.status};
  }catch(e){ return {ok:false,err:String(e)}; }
}
function timeCache(data){              // write a snapshot into the local cache
  save(K.emp,data.employees||[]); save(K.time,data.entries||[]);
  save(K.shifts,data.shifts||[]); save(K.sites,data.sites||[]);
}
async function timeAdminPull(){        // admin: refresh caches from server
  if(!cloudPw) return false;
  const t=await timeAdminGet(cloudPw);
  if(t.ok){ timeCache(t.data); return true; }
  return false;
}
async function timeEmpPull(){          // guard: refresh own entries from server
  if(!session||session.role!=='employee'||!empPin) return false;
  const res=await timeLogin(session.empId,empPin);
  if(res.ok){ save(K.time,res.entries||[]); save(K.shifts,res.shifts||[]); if(res.sites)save(K.sites,res.sites); return true; }
  return false;
}
async function timeConfig(patch){      // admin: replace config arrays (employees/shifts/sites)
  if(!cloudPw) return false;
  try{ const r=await fetch(TIME_API,{method:'POST',headers:{'x-gts-pw':cloudPw,'content-type':'application/json'},
       body:JSON.stringify({action:'config',...patch})}); return r.ok; }catch(e){ return false; }
}
async function reviewEntry(entryId,status){   // admin: approve / flag / reject a punch
  if(timeCloud && cloudPw){
    try{ const r=await fetch(TIME_API,{method:'POST',headers:{'x-gts-pw':cloudPw,'content-type':'application/json'},
         body:JSON.stringify({action:'review',entryId,status})});
      if(r.ok){ await timeAdminPull(); toast('Entry '+status); render(); return; }
    }catch(e){}
  }
  // offline fallback: mutate the local cache
  const time=load(K.time,[]); const t=time.find(x=>x.id===entryId);
  if(t){ t.status=status; save(K.time,time); toast('Entry '+status); render(); }
}
/* Geolocation with a sane timeout; resolves null if denied/unavailable (server flags "No GPS"). */
function getLoc(){
  return new Promise(res=>{
    if(!navigator.geolocation) return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),
      ()=>res(null),{enableHighAccuracy:true,timeout:8000,maximumAge:30000});
  });
}
/* Offline/local punch fallback — mirrors the server's in/out/break logic, minus geofence. */
function punchLocal(type){
  const time=load(K.time,[]);
  const active=time.find(t=>t.empId===session.empId&&!t.out);
  const now=Date.now();
  if(type==='in'){
    if(active)return {ok:false,error:'already-clocked-in'};
    const today=new Date().toISOString().slice(0,10);
    const shift=load(K.shifts,[]).find(s=>s.empId===session.empId&&s.date===today);
    time.push({id:uid(),empId:session.empId,in:now,out:null,breaks:[],inLoc:null,outLoc:null,
      site:shift?shift.site:null,shiftId:shift?shift.id:null,status:'pending',flags:[],reviewNote:''});
  }else{
    if(!active)return {ok:false,error:'not-clocked-in'};
    active.breaks=active.breaks||[];
    const open=active.breaks.find(b=>!b.end);
    if(type==='break_start'){ if(open)return {ok:false,error:'already-on-break'}; active.breaks.push({start:now,end:null}); }
    else if(type==='break_end'){ if(!open)return {ok:false,error:'not-on-break'}; open.end=now; }
    else if(type==='out'){ if(open)open.end=now; active.out=now; }
  }
  save(K.time,time);
  return {ok:true};
}

const STAGES=['New','Contacted','Demo Sent','Proposal','Won','Lost'];

/* Sales-cadence next steps (security guard B2B field sales) */
const NEXT_STEPS=[
  'Send intro email',
  'First call',
  'First visit',
  'Site walk-through',
  'Send proposal',
  'Follow-up call',
  'Follow-up visit',
  'Send contract',
  'Schedule meeting',
  'Awaiting decision',
  'Nurture / check back',
  '— No next step —'
];
const NO_STEP='— No next step —';

/* ===== HITL ACTION PIPELINE =====
   Each pipeline stage maps to an action the AGENT prepares. When the user moves a lead
   to a new stage, the lead is flagged actionStatus='pending'; on the agent's next review
   it drafts the right artifact for that stage and sets actionStatus='ready' for the user
   to review + send. Statuses: pending (agent to do) → ready (review/send) → done. */
const STAGE_ACTIONS={
  'New':'LinkedIn intro — connection note + first message',
  'Contacted':'Follow-up message',
  'Demo Sent':'Coverage-plan / demo follow-up',
  'Proposal':'Proposal & pricing',
  'Won':'Onboarding kickoff (see close-and-deliver)',
  'Lost':'Log reason + nurture later'
};
function actionFor(stage){return STAGE_ACTIONS[stage]||'Review';}
function queueForAgent(l){l.actionStatus='pending';l.actionStage=l.stage;l.draft='';}
function actionBadge(l){
  if(l.actionStatus==='approved')return '<span style="background:#173a4d;color:#5cc8e0;border:1px solid #2f5e6b;border-radius:6px;padding:1px 6px;font-size:.66rem;font-weight:600">✓ owner-approved</span>';
  if(l.actionStatus==='ready')return '<span style="background:#1e3a2f;color:#56d39b;border:1px solid #2f6b50;border-radius:6px;padding:1px 6px;font-size:.66rem;font-weight:600">✎ draft ready</span>';
  if(l.actionStatus==='pending')return '<span style="background:#3a331e;color:#e0c056;border:1px solid #6b5e2f;border-radius:6px;padding:1px 6px;font-size:.66rem;font-weight:600">⏳ agent</span>';
  return '';
}
function requeueAction(id){const leads=load(K.leads,[]);const l=leads.find(x=>x.id===id);if(l){queueForAgent(l);save(K.leads,leads);toast('Queued for agent — it will draft on next review');render();leadDetail(id);}}
function markActionDone(id){const leads=load(K.leads,[]);const l=leads.find(x=>x.id===id);if(l){l.actionStatus='done';save(K.leads,leads);toast('Marked done');render();leadDetail(id);}}
/* sensible default next action for a given pipeline stage */
function defaultNextStep(stage){
  return ({
    'New':'First call',
    'Contacted':'Follow-up call',
    'Demo Sent':'Follow-up call',
    'Proposal':'Follow-up call',
    'Won':NO_STEP,
    'Lost':NO_STEP
  })[stage]||'First call';
}
function isoIn(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}
/* due-date status → chip class + label */
function dueInfo(due){
  if(!due)return{cls:'none',txt:'No date'};
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(due+'T00:00');
  const diff=Math.round((d-today)/86400000);
  if(diff<0)return{cls:'overdue',txt:'Overdue '+Math.abs(diff)+'d'};
  if(diff===0)return{cls:'today',txt:'Due today'};
  if(diff===1)return{cls:'soon',txt:'Due tomorrow'};
  if(diff<=3)return{cls:'soon',txt:'In '+diff+'d'};
  return{cls:'none',txt:fmtDate(d.getTime())};
}

function seed(){

  const employees=[

    {id:'e4',name:'Priya Shah',title:'Event Security Lead',pin:'1234'},

  ];
  save(K.emp,employees);

  // seed leads — real Houston prospect pipeline (generated from lead-gen/leads.csv, 2026-06-25)
  const _real = [
  {

  },
  {

    "city": "Houston",

    "specialty": "Retail / Shopping Center PM",

/* ========================= AUTH ========================= */
let role='employee', session=null;
function setRole(r){
  role=r;
  document.getElementById('tabEmp').classList.toggle('active',r==='employee');
  document.getElementById('tabAdmin').classList.toggle('active',r==='admin');
  document.getElementById('tabOwner').classList.toggle('active',r==='owner');
  document.getElementById('empLogin').classList.toggle('hidden',r!=='employee');
  document.getElementById('adminLogin').classList.toggle('hidden',r!=='admin');
  document.getElementById('ownerLogin').classList.toggle('hidden',r!=='owner');
  document.getElementById('loginErr').classList.add('hidden');
  document.getElementById('loginHint').innerHTML = r==='employee'
    ? 'Demo PIN for all staff: <code>1234</code>'
    : r==='owner'
    ? 'Owner sign-in — Kenrick M.'
    : 'Operations team sign-in.';
}
function showErr(m){const e=document.getElementById('loginErr');e.textContent=m;e.classList.remove('hidden');}
async function doLogin(){
  if(role==='employee'){
    const id=document.getElementById('empSelect').value;
    const pin=document.getElementById('empPin').value;
    if(!id)return showErr('Select your name.');
    if(!pin)return showErr('Enter your PIN.');
    const res=await timeLogin(id,pin);
    if(res.ok){
      empPin=pin; timeCloud=true;
      save(K.time,res.entries||[]); save(K.shifts,res.shifts||[]); if(res.sites)save(K.sites,res.sites);
      session={role:'employee',empId:res.employee.id,name:res.employee.name,title:res.employee.title,pin};
    }else if(res.status===401){ return showErr('Incorrect PIN.'); }
    else{                                   // server unreachable → local demo fallback
      const emp=load(K.emp,[]).find(e=>e.id===id);
      if(!emp)return showErr('Select your name.');
      if(pin!==emp.pin)return showErr('Incorrect PIN.');
      empPin=pin; timeCloud=false;
      session={role:'employee',empId:emp.id,name:emp.name,title:emp.title,pin};
    }
  }else if(role==='admin'){
    const p=document.getElementById('adminPass').value;
    const res = await cloudGet(p);
    if(!res.ok) return showErr(res.status===401 ? 'Invalid admin password.' : 'Could not reach the CRM server — check your connection.');
    if(res.role==='owner') return showErr("That's the Owner password — use the Owner tab.");
    cloudPw = p; localStorage.setItem('gts_pw', p); cloudReady = true;
    // First login against an empty cloud: seed it from this device's existing pipeline.
    // Otherwise the cloud is the source of truth — pull it into the local cache.
    const localLeads = load(K.leads, []);
    if(res.leads.length===0 && localLeads.length>0){ cloudPush(); }
    else { localStorage.setItem(K.leads, JSON.stringify(res.leads)); }
    // Time-clock snapshot: pull it, or seed the cloud from the local demo on first run.
    const t=await timeAdminGet(p);
    if(t.ok){
      timeCloud=true;
      if((t.data.employees||[]).length===0){
        const employees=load(K.emp,[]);
        const shifts=load(K.shifts,[]);
        const sites=[...new Set(shifts.map(s=>s.site).filter(Boolean))].map(name=>({id:uid(),name,lat:null,lng:null,radius:150}));
        await timeConfig({employees,shifts,sites});
        timeCache({employees,shifts,sites,entries:[]});
      }else{ timeCache(t.data); }
    }
    session={role:'admin',name:'Geovonni O.',title:'Operations / Admin'};
  }else{
    // ===== OWNER (Kenrick M.) — exec summary + approvals, signs in with his own password =====
    const p=document.getElementById('ownerPass').value;
    const res = await cloudGet(p);
    if(!res.ok) return showErr(res.status===401 ? 'Invalid owner password.' : 'Could not reach the server — check your connection.');
    if(res.role!=='owner') return showErr(res.role==='admin' ? "That's the Admin password — use the Admin tab." : 'Invalid owner password.');
    cloudPw = p; localStorage.setItem('gts_pw', p); cloudReady = true;
    localStorage.setItem(K.leads, JSON.stringify(res.leads));   // cloud is the source of truth — never seed from the owner's device
    const t=await timeAdminGet(p);
    if(t.ok){ timeCloud=true; timeCache(t.data); }
    session={role:'owner',name:'Kenrick M.',title:'Owner'};
  }
  save(K.session,session);
  startApp();
}
function logout(){localStorage.removeItem(K.session);localStorage.removeItem('gts_pw');cloudReady=false;cloudPw=null;empPin=null;timeCloud=false;location.reload();}

/* ========================= HELPERS ========================= */
function hrs(ms){return ms/3600000;}
function fmtH(h){const H=Math.floor(h),M=Math.round((h-H)*60);return `${H}h ${M}m`;}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function activeEntry(empId){return load(K.time,[]).find(t=>t.empId===empId&&!t.out);}
function breakMs(t){return (t.breaks||[]).reduce((s,b)=>s+((b.end||Date.now())-b.start),0);}
function workedMs(t){return Math.max(0,((t.out||Date.now())-t.in)-breakMs(t));} // billable = elapsed − unpaid breaks
function onBreak(t){return !!(t&&(t.breaks||[]).some(b=>!b.end));}
function weekHours(empId){
  const wk=startOfWeek().getTime();
  return load(K.time,[]).filter(t=>t.empId===empId&&t.in>=wk).reduce((s,t)=>s+hrs(workedMs(t)),0);
}
function money(n){return '$'+Number(n||0).toLocaleString();}
function toast(m){const t=document.getElementById('toast');t.innerHTML='<span class="ck">✓</span>'+m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

/* ========================= RENDER ROUTER ========================= */
function render(){
  const v=document.getElementById('view');
  if(session.role==='employee'){
    if(currentView==='dash')return empDash(v);
    if(currentView==='hours')return empHours(v);
    if(currentView==='schedule')return empSchedule(v);
  }else if(session.role==='owner'){
    if(currentView==='dash')return ownerDash(v);
    if(currentView==='approvals')return ownerApprovals(v);
  }else{
    if(currentView==='dash')return adminDash(v);
    if(currentView==='crm')return crm(v);
    if(currentView==='team')return team(v);
    if(currentView==='schedule')return adminSchedule(v);
  }
}

const PUNCH_MSG={in:'Clocked in. Stay safe out there.',out:'Clocked out — logged for review.',break_start:'Break started.',break_end:'Back on the clock.'};
const PUNCH_ERR={'already-clocked-in':'You are already clocked in.','not-clocked-in':'You are not clocked in.','already-on-break':'You are already on break.','not-on-break':'You are not on break.','bad-credentials':'Session expired — please sign in again.','location-required':'Turn on location access — you must be at your post to clock in or out.'};
function punchErrMsg(res,type){
  if(res.error==='outside-geofence'){

let punching=false;

/* ===== CRM derived helpers (shared by UI + window.GTS agent API) ===== */
function normKey(l){return ((l&&l.company||'')+'|'+(l&&l.contact||'')).toLowerCase().trim();}
function scoreOf(l){                 // parse "Score NN" out of notes[] (or l.score if present)
  if(l&&typeof l.score==='number')return l.score;
  const notes=(l&&l.notes)||[];
  for(const n of notes){const m=/score\s*[:\-]?\s*(\d{1,3})/i.exec(n&&n.t||'');if(m)return Number(m[1]);}
  return null;
}
function segOf(l){return (l&&l.specialty)||'—';}
function lastActivityTs(l){
  const notes=(l&&l.notes)||[];
  let t=l&&l.created||0; notes.forEach(n=>{if(n&&n.when>t)t=n.when;});
  return t;
}
function leadByKey(key){             // accept id, "company|contact", or company name (case-insensitive)
  const leads=load(K.leads,[]); if(!key)return null;
  const k=String(key).toLowerCase().trim();
  return leads.find(l=>l.id===key) || leads.find(l=>normKey(l)===k)
      || leads.find(l=>(l.company||'').toLowerCase().trim()===k) || null;
}

/* ===== CRM view state (persists across re-renders) ===== */
let crmS={ view:'table', smart:'all', sort:{col:'score',dir:-1}, search:'', stage:'', seg:'', minScore:0 };
const SMART_VIEWS=[
  ['all','All'],['today','Today'],['calls','Call List'],['email','Has Email'],['linkedin','Has LinkedIn'],
  ['awaiting','Awaiting Send'],['segment','By Segment'],['highscore','Highest Score']
];
function crmMatch(l){
  // smart-view scoping
  if(crmS.smart==='today'){ if(['Won','Lost'].includes(l.stage))return false;
    if(!['overdue','today'].includes(dueInfo(l.nextStepDue).cls))return false; }
  else if(crmS.smart==='calls'){ if((l.email||'').trim()&&(l.email||'').trim()!=='—')return false; }
  else if(crmS.smart==='email'){ const e=(l.email||'').trim(); if(!e||e==='—')return false; }
  else if(crmS.smart==='linkedin'){ if(!/^https?:/i.test((l.linkedin||'').trim()))return false; }
  else if(crmS.smart==='awaiting'){
    const drafted=(l.notes||[]).some(n=>/drafted|awaiting send/i.test(n&&n.t||''))||/send cold email/i.test(l.nextStep||'')||l.actionStatus==='ready';
    if(!drafted)return false; }
  // filters
  if(crmS.stage && l.stage!==crmS.stage)return false;
  if(crmS.seg && segOf(l)!==crmS.seg)return false;
  if(crmS.minScore){ const s=scoreOf(l); if(s==null||s<crmS.minScore)return false; }
  // free-text search across company/contact/email
  if(crmS.search){ const q=crmS.search.toLowerCase();
    if(!((l.company||'')+' '+(l.contact||'')+' '+(l.email||'')+' '+(l.specialty||'')).toLowerCase().includes(q))return false; }
  return true;
}
function crmList(){
  let rows=load(K.leads,[]).filter(crmMatch);
  let {col,dir}=crmS.sort;
  if(crmS.smart==='highscore'){col='score';dir=-1;}
  if(crmS.smart==='segment'){col='segment';dir=1;}
  const get={ company:l=>(l.company||'').toLowerCase(), contact:l=>(l.contact||'').toLowerCase(),
    segment:l=>segOf(l).toLowerCase(), score:l=>scoreOf(l)??-1, value:l=>Number(l.value||0),
    stage:l=>STAGES.indexOf(l.stage), nextStep:l=>(l.nextStep||'').toLowerCase(),
    due:l=>l.nextStepDue||'￿', activity:l=>lastActivityTs(l) };
  const g=get[col]||get.score;
  rows.sort((a,b)=>{const x=g(a),y=g(b);return x<y?-1*dir:x>y?1*dir:0;});
  return rows;
}

function vertical(l){
  const s=(((l&&l.specialty)||'')+' '+((l&&l.company)||'')).toLowerCase();
  if(/retail|shopping|mall/.test(s))                            return {who:'retail & shopping-center properties', angle:'loss prevention, parking-lot patrol & after-hours coverage'};
  if(/multifamily|apartment/.test(s))                           return {who:'multifamily communities',            angle:'courtesy patrol, tenant safety & curb appeal'};
  if(/hoa|condo|community assoc|high-rise/.test(s))             return {who:'HOAs & community associations',       angle:'courtesy patrol, amenity & parking enforcement, resident peace of mind'};
  if(/faith|church|congregation|preschool|megachurch/.test(s))  return {who:'churches & faith campuses',           angle:'weekend-service & event coverage, parking & child-safety'};
  if(/office|class-a/.test(s))                                  return {who:'office properties',                   angle:'lobby/visitor access control & after-hours coverage'};
  if(/industrial|warehouse|distribution/.test(s))              return {who:'industrial & warehouse sites',         angle:'perimeter security, access control & theft deterrence'};
  if(/commercial/.test(s))                                      return {who:'commercial properties',               angle:'on-site uniformed presence & liability reduction'};

/* =====================================================================
   ============== DATA DICTIONARY + window.GTS AGENT API ===============
   =====================================================================
   LEAD SCHEMA (one object per lead, stored as an array in localStorage key
   'kmgts_leads' AND mirrored to the Netlify Blobs cloud store via crm.mjs):
     id          string   stable unique id (auto)
     company     string   business name           -- DEDUPE KEY part 1
     contact     string   decision-maker name     -- DEDUPE KEY part 2
     title       string   contact's title
     phone       string   "" or "—" = none
     city        string   default "Houston, TX"
     email       string   "" or "—" = none (-> Call List)
     linkedin    string   profile URL
     specialty   string   segment / vertical (shown as "Segment")
     stage       enum     one of STAGES: New, Contacted, Demo Sent, Proposal, Won, Lost
     value       number   est. monthly contract $ (open pipeline = sum where stage not in {Won,Lost})
     nextStep    string   one of NEXT_STEPS
     nextStepDue string   ISO date "YYYY-MM-DD" or ""
     notes       [{t,when}]  activity timeline; "Score NN" in any note -> the lead's score
     created     number   epoch ms
   DEDUPE KEY = (company + "|" + contact) lowercased+trimmed  (see normKey()).
   SYNC: every write goes through save('kmgts_leads', arr) which debounce-pushes the
   full array to the cloud (cloudPush) when an admin is signed in (cloudReady).
   The cloud blob is the shared source of truth; localStorage is the local cache.
   ===================================================================== */
const GTS = (function(){
  const getAll=()=>load(K.leads,[]);
  const commit=arr=>{ save(K.leads,arr); if(typeof currentView!=='undefined'&&currentView==='crm'&&session) render(); };
  const find=(arr,key)=>{ if(!key)return -1; const k=String(key).toLowerCase().trim();
    let i=arr.findIndex(l=>l.id===key); if(i>=0)return i;
    i=arr.findIndex(l=>normKey(l)===k); if(i>=0)return i;
    return arr.findIndex(l=>(l.company||'').toLowerCase().trim()===k); };
  const shape=l=>({id:l.id,company:l.company,contact:l.contact,title:l.title,phone:l.phone,city:l.city,
    email:l.email,linkedin:l.linkedin,specialty:l.specialty,segment:segOf(l),stage:l.stage,value:Number(l.value||0),
    score:scoreOf(l),nextStep:l.nextStep,nextStepDue:l.nextStepDue,lastActivity:lastActivityTs(l),
    notes:(l.notes||[]).slice(),key:normKey(l)});
  const blank=()=>({id:uid(),company:'',contact:'—',title:'',phone:'',city:'Houston, TX',email:'',linkedin:'',
    specialty:'',stage:'New',value:0,nextStep:'First call',nextStepDue:'',notes:[],created:Date.now()});
  const FIELDS=['company','contact','title','phone','city','email','linkedin','specialty','stage','value','nextStep','nextStepDue'];
  function applyPatch(l,obj){ FIELDS.forEach(f=>{ if(obj[f]!==undefined && obj[f]!==null){ l[f]=f==='value'?Number(obj[f])||0:obj[f]; } });
    if(obj.note){ l.notes=l.notes||[]; l.notes.push({t:String(obj.note),when:Date.now()}); } }

  return {
    /* READ */
    listLeads(filter){ filter=filter||{}; let rows=getAll().filter(l=>{
        if(filter.stage&&l.stage!==filter.stage)return false;
        if(filter.segment&&segOf(l)!==filter.segment)return false;
        if(filter.minScore!=null){const s=scoreOf(l);if(s==null||s<filter.minScore)return false;}
        if(filter.noEmail&&((l.email||'').trim()&&(l.email||'').trim()!=='—'))return false;
        if(filter.search){const q=String(filter.search).toLowerCase();
          if(!((l.company||'')+' '+(l.contact||'')+' '+(l.email||'')+' '+(l.specialty||'')).toLowerCase().includes(q))return false;}
        return true; });
      return {ok:true,count:rows.length,leads:rows.map(shape)}; },
    getLead(key){ const arr=getAll(),i=find(arr,key); return i<0?{ok:false,error:'not found'}:{ok:true,lead:shape(arr[i])}; },
    /* WRITE (all dedupe by company|contact, all cloud-sync via save()) */
    upsertLead(obj){ if(!obj||(!obj.company&&!obj.contact))return {ok:false,error:'company or contact required'};
      const arr=getAll(); const key=((obj.company||'')+'|'+(obj.contact||'')).toLowerCase().trim();
      let i=arr.findIndex(l=>normKey(l)===key);
      if(i>=0){ applyPatch(arr[i],obj); commit(arr); return {ok:true,action:'updated',id:arr[i].id,key:normKey(arr[i])}; }
      const l=blank(); applyPatch(l,obj); arr.push(l); commit(arr);
      return {ok:true,action:'added',id:l.id,key:normKey(l)}; },
    updateLead(key,patch){ const arr=getAll(),i=find(arr,key); if(i<0)return {ok:false,error:'not found'};
      applyPatch(arr[i],patch||{}); commit(arr); return {ok:true,id:arr[i].id}; },
    addNote(key,text){ if(!text)return {ok:false,error:'text required'}; const arr=getAll(),i=find(arr,key);
      if(i<0)return {ok:false,error:'not found'}; arr[i].notes=arr[i].notes||[]; arr[i].notes.push({t:String(text),when:Date.now()});
      commit(arr); return {ok:true,id:arr[i].id,notes:arr[i].notes.length}; },
    setStage(key,stage){ if(!STAGES.includes(stage))return {ok:false,error:'stage must be one of '+STAGES.join(', ')};
      const arr=getAll(),i=find(arr,key); if(i<0)return {ok:false,error:'not found'};
      arr[i].stage=stage; if(!arr[i].nextStep||arr[i].nextStep===NO_STEP)arr[i].nextStep=defaultNextStep(stage);
      if(typeof queueForAgent==='function')queueForAgent(arr[i]); commit(arr); return {ok:true,id:arr[i].id,stage}; },
    setNextStep(key,step,due){ const arr=getAll(),i=find(arr,key); if(i<0)return {ok:false,error:'not found'};
      if(step!=null)arr[i].nextStep=step; if(due!==undefined)arr[i].nextStepDue=due||''; commit(arr);
      return {ok:true,id:arr[i].id,nextStep:arr[i].nextStep,nextStepDue:arr[i].nextStepDue}; },
    bulkUpsert(list){ if(!Array.isArray(list))return {ok:false,error:'array required'};
      const arr=getAll(); let added=0,updated=0;
      list.forEach(obj=>{ if(!obj||(!obj.company&&!obj.contact))return;
        const key=((obj.company||'')+'|'+(obj.contact||'')).toLowerCase().trim();
        let i=arr.findIndex(l=>normKey(l)===key);
        if(i>=0){applyPatch(arr[i],obj);updated++;}else{const l=blank();applyPatch(l,obj);arr.push(l);added++;} });
      commit(arr); return {ok:true,added,updated,total:arr.length}; },
    exportJSON(){ return JSON.stringify(getAll(),null,2); },
    importJSON(str){ try{const list=JSON.parse(str);return this.bulkUpsert(list);}catch(e){return {ok:false,error:String(e)};} },
    stats(){ const arr=getAll(); const byStage={}; STAGES.forEach(s=>byStage[s]=0);
      const bySegment={}; let pipeline=0,won=0,dueToday=0;
      arr.forEach(l=>{ byStage[l.stage]=(byStage[l.stage]||0)+1; const sg=segOf(l); bySegment[sg]=(bySegment[sg]||0)+1;
        if(!['Won','Lost'].includes(l.stage)){pipeline+=Number(l.value||0); if(['overdue','today'].includes(dueInfo(l.nextStepDue).cls))dueToday++;}
        if(l.stage==='Won')won+=Number(l.value||0); });
      return {ok:true,total:arr.length,byStage,bySegment,pipeline,wonValue:won,dueTodayOrOverdue:dueToday}; },
    help(asHtml){
      const h=`<b>window.GTS — KM-GTS CRM agent API</b> (all writes dedupe by company|contact and cloud-sync)
<h4>Read</h4>
<code>GTS.listLeads({stage,segment,minScore,noEmail,search})</code> -> {ok,count,leads[]}
<code>GTS.getLead(idOrCompanyContactOrCompany)</code> -> {ok,lead}
<code>GTS.stats()</code> -> {total,byStage,bySegment,pipeline,wonValue,dueTodayOrOverdue}
<code>GTS.exportJSON()</code> -> full array as JSON string
<h4>Write (idempotent, route through save()->cloudPush)</h4>
<code>GTS.upsertLead({company,contact,...,note})</code> -> adds or patches; never blanks fields you omit
<code>GTS.updateLead(key,{patch})</code> · <code>GTS.bulkUpsert([{...}])</code> · <code>GTS.importJSON(str)</code>
<code>GTS.addNote(key,text)</code> · <code>GTS.setStage(key,stage)</code> · <code>GTS.setNextStep(key,step,due)</code>
<h4>Keys &amp; enums</h4>
key = id, "company|contact" (lowercased), or company name. stage in ${STAGES.join(', ')}.
score is parsed from a "Score NN" note. Read the data dictionary comment above this block in source.
<h4>DOM (for reading the rendered table)</h4>
rows: <code>[data-lead-id]</code>, <code>[data-company-contact]</code>; editable cells: <code>[data-field=stage|nextStep]</code>; smart views: <code>.view-tab[data-view]</code>.`;
      if(asHtml)return h;
      const txt=h.replace(/<h4>/g,'\n— ').replace(/<\/h4>/g,' —').replace(/<[^>]+>/g,'');
      console.log(txt); return txt;
    }
  };
})();
try{ window.GTS=GTS; }catch(e){}

/* ========================= MIGRATION ========================= */
/* backfill next-step fields onto leads seeded before this feature existed (no data loss) */
function migrateLeads(){
  const leads=load(K.leads,[]);let changed=false;
  const plan={
    'ABCO Industrial Properties':['Follow-up call',0],
    'Oak Leaf Management':['First call',2],
    'Black Label Commercial Group':['Follow-up call',-1],
    'Bayou Properties Realty':['First visit',3],
    'Shannon Property Management':['Send contract',1],
    'Productive Property Management':['Schedule meeting',-2],
    'Creative Management Company':[NO_STEP,null]
  };
  leads.forEach(l=>{
    if(l.nextStep===undefined){
      const p=plan[l.company];
      if(p){l.nextStep=p[0];l.nextStepDue=p[1]==null?'':isoIn(p[1]);}
      else{l.nextStep=defaultNextStep(l.stage);l.nextStepDue='';}
      changed=true;
    }
  });
  if(changed)save(K.leads,leads);
}

/* ========================= BOOT ========================= */
seed();
migrateLeads();

function populateRoster(list){
  const sel=document.getElementById('empSelect'); if(!sel||!list)return;
  sel.innerHTML=list.map(e=>`<option value="${e.id}">${e.name} — ${e.title}</option>`).join('');
}
(async function init(){
  populateRoster(load(K.emp,[]));                 // local seeds first (instant)
  document.getElementById('empPin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('adminPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  const roster=await timeRoster();                // then prefer the live cloud roster
  if(roster&&roster.length)populateRoster(roster);
  if(load(K.session,null)){startApp();}
})();

/* Re-pull shared data when the tab regains focus, so another device's changes show up. */
window.addEventListener('focus',()=>{
  if(!session) return;
  if(cloudReady) cloudPull().then(ok=>{ if(ok && currentView) render(); });
  if(timeCloud){
    const pull = session.role==='admin' ? timeAdminPull : timeEmpPull;
    pull().then(ok=>{ if(ok && currentView) render(); });
  }
});

/* ========================= CRM AGENT CHAT =========================
   A conversational teammate inside the CRM. Talks to Claude via the
   /agent function, which can add/remove/update/move leads, add notes,
   and open browser tabs for research. Each turn ships the LIVE leads so
   the agent always sees what the user just changed by hand. */
// Claude-powered CRM agent is temporarily disabled. Flip to true to bring back the
// "💬 Ask Agent" launcher (the agent.mjs function stays deployed, just unused for now).
const AGENT_ENABLED=false;
const AGENT_API='/.netlify/functions/agent';
const K_CHAT='kmgts_agent_chat';
let agentMsgs=load(K_CHAT,[]);
let agentBusy=false;
const AGENT_SUGGESTIONS=[
  'Summarize my pipeline',
  "What's overdue?",
  'Add lead: Lakeside HOA, contact Maria Reyes, Proposal, $4,800',
  'Look up property managers in the Heights on LinkedIn',
];

function ensureAgentUI(){
  if(document.getElementById('agentFab'))return;
  const fab=document.createElement('button');
  fab.id='agentFab';
  fab.innerHTML='<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Ask Agent';
  fab.onclick=openAgent;
  document.body.appendChild(fab);

  const p=document.createElement('div');
  p.id='agentPanel';
  p.innerHTML=`
    <div class="ag-head">
      <div class="ag-ava">🤖</div>
      <div><div class="ag-t">CRM Agent</div><div class="ag-s">Manages your pipeline · opens research tabs</div></div>
      <button class="ag-x" onclick="closeAgent()">×</button>
    </div>
    <div class="ag-msgs" id="agMsgs"></div>
    <div class="ag-input">
      <textarea id="agField" rows="1" placeholder="Ask me to add a lead, move a deal, draft outreach, look someone up…"></textarea>
      <button class="ag-send" id="agSend" onclick="agentSend()">Send</button>
    </div>`;
  document.body.appendChild(p);

  const f=document.getElementById('agField');
  f.addEventListener('input',()=>{f.style.height='auto';f.style.height=Math.min(f.scrollHeight,120)+'px';});
  f.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();agentSend();}});
  renderAgentChat();
}
function updateAgentFab(){
  if(!AGENT_ENABLED){const f=document.getElementById('agentFab');if(f)f.classList.remove('show');closeAgent();return;}
  ensureAgentUI();
  const fab=document.getElementById('agentFab');
  const show=session&&session.role==='admin'&&currentView==='crm';
  fab.classList.toggle('show',!!show);
  if(!show)closeAgent();
}
function openAgent(){document.getElementById('agentPanel').classList.add('open');renderAgentChat();setTimeout(()=>document.getElementById('agField').focus(),200);}
function closeAgent(){const p=document.getElementById('agentPanel');if(p)p.classList.remove('open');}

function renderAgentChat(){
  const box=document.getElementById('agMsgs');if(!box)return;
  if(!agentMsgs.length){
    box.innerHTML=`<div class="ag-empty">👋 I'm your CRM teammate. I can add &amp; remove leads, move deals between stages, draft outreach, and open LinkedIn/Google tabs to research prospects.
      <div class="ag-chips">${AGENT_SUGGESTIONS.map(s=>`<button class="ag-chip" onclick="agentQuick(this.dataset.q)" data-q="${esc(s)}">${esc(s)}</button>`).join('')}</div></div>`;
    return;
  }
  box.innerHTML=agentMsgs.map(m=>{
    if(m.role==='user')return `<div class="ag-row user"><div class="ag-bub">${esc(m.content)}</div></div>`;
    const acts=(m.actions&&m.actions.length)?`<div class="ag-acts">${m.actions.map(a=>`<div class="ag-act">${esc(a)}</div>`).join('')}</div>`:'';
    const tabs=(m.openTabs&&m.openTabs.length)?`<div class="ag-tabs">${m.openTabs.map(t=>`<a class="ag-tab" href="${esc(t.url)}" target="_blank" rel="noopener noreferrer">↗ ${esc(t.reason||t.url)}</a>`).join('')}</div>`:'';
    return `<div class="ag-row bot"><div class="ag-bub">${esc(m.content)}</div>${acts}${tabs}</div>`;
  }).join('');
  if(agentBusy)box.insertAdjacentHTML('beforeend','<div class="ag-row bot" id="agTyping"><div class="ag-bub ag-typing"><span></span><span></span><span></span></div></div>');
  box.scrollTop=box.scrollHeight;
}
function agentQuick(q){document.getElementById('agField').value=q;agentSend();}

async function agentSend(){
  if(agentBusy)return;
  const f=document.getElementById('agField');
  const text=f.value.trim();if(!text)return;
  if(!cloudPw){pushAgentBot("I need the cloud connection to manage your CRM — please log in as admin (online).");return;}
  f.value='';f.style.height='auto';
  agentMsgs.push({role:'user',content:text});
  save(K_CHAT,agentMsgs);
  agentBusy=true;document.getElementById('agSend').disabled=true;renderAgentChat();
  try{
    const leads=load(K.leads,[]);
    // send only role/content history to the model
    const history=agentMsgs.map(m=>({role:m.role,content:m.content}));
    const r=await fetch(AGENT_API,{method:'POST',headers:{'x-gts-pw':cloudPw,'content-type':'application/json'},
      body:JSON.stringify({messages:history,leads})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){pushAgentBot('⚠️ '+(d.error||('Agent error '+r.status)));return;}
    // 1) apply CRM mutations → local cache + cloud sync, then refresh the board behind the drawer
    if(Array.isArray(d.leads)){localStorage.setItem(K.leads,JSON.stringify(d.leads));if(cloudReady)cloudPush();}
    // 2) open any research tabs (also linked in the bubble in case the popup is blocked)
    (d.openTabs||[]).forEach(t=>{try{window.open(t.url,'_blank','noopener');}catch(e){}});
    agentMsgs.push({role:'assistant',content:d.reply||'Done.',actions:d.actions||[],openTabs:d.openTabs||[]});
    save(K_CHAT,agentMsgs);
    if(currentView==='crm')render();
  }catch(e){pushAgentBot('⚠️ '+(e&&e.message||e));}
  finally{agentBusy=false;const b=document.getElementById('agSend');if(b)b.disabled=false;renderAgentChat();}
}
function pushAgentBot(msg){agentMsgs.push({role:'assistant',content:msg});save(K_CHAT,agentMsgs);agentBusy=false;const b=document.getElementById('agSend');if(b)b.disabled=false;renderAgentChat();}

/* ===== AUTO-UPDATE: reload this tab when a new deploy is detected ===== */
(function(){
  var loaded=null;
  async function check(){
    try{
      var r=await fetch('/version.json?cb='+Date.now(),{cache:'no-store'});
      if(!r.ok)return;
      var v=(await r.json()).v;
      if(loaded===null){loaded=v;}
      else if(v&&v!==loaded){location.reload();}
    }catch(e){}
  }
  check();
  setInterval(check,60000);
  document.addEventListener('visibilitychange',function(){if(!document.hidden)check();});
})();

/* ── Site-wide GTS canvas logo (matches index.html nav/footer) ── */
function drawGTSLogo(canvas){
  const ctx=canvas.getContext('2d'); const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const pent=(cx,cy,r)=>Array.from({length:5},(_,i)=>{const a=Math.PI/180*(-90+i*72);return [cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  const tracePent=pts=>{ctx.beginPath();pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));ctx.closePath();};
  const cx=W/2, R=W*0.460, gap=W*0.050;
  const cy=(H+R*0.191)/2, Ri=R-gap;
  const outerPts=pent(cx,cy,R), innerPts=pent(cx,cy,Ri);
  ctx.save();
  ctx.shadowColor='rgba(245,197,0,0.16)'; ctx.shadowBlur=W*0.04; ctx.shadowOffsetY=W*0.007;
  tracePent(outerPts); ctx.fillStyle='#F5C500'; ctx.fill();
  ctx.restore();
  tracePent(innerPts);
  const grad=ctx.createRadialGradient(cx,cy-R*0.1,0,cx,cy,Ri*0.95);
  grad.addColorStop(0,'#1c1c1c'); grad.addColorStop(1,'#070707');
  ctx.fillStyle=grad; ctx.fill();
  const topY=innerPts[0][1],bottomY=innerPts[2][1],height=bottomY-topY;
  const sideVy=innerPts[1][1];
  const sideHalfW=(innerPts[1][0]-innerPts[4][0])/2;
  const botHalfW=(innerPts[2][0]-innerPts[3][0])/2;
  const halfWidthAt=y=>{if(y<=sideVy){const t=(y-topY)/(sideVy-topY);return sideHalfW*t;}const t=(y-sideVy)/(bottomY-sideVy);return sideHalfW+(botHalfW-sideHalfW)*t;};
  const baselineY=topY+height*0.60;
  let baseSize=height*0.30, sG=baseSize, sT=baseSize*1.32, sDot=baseSize*0.95;
  const tight=-baseSize*0.02;
  ctx.fillStyle='#F5C500'; ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  const gw=(ch,s,w=700)=>{ctx.font=`${w} ${s}px 'Oswald','Arial Narrow',sans-serif`;return ctx.measureText(ch).width;};
  const tw=()=>gw('G',sG,600)+tight+gw('.',sDot)+tight+gw('T',sT)+tight+gw('.',sDot)+tight+gw('S',sG,600);
  const maxW=halfWidthAt(baselineY)*0.86*2;
  const ratio=tw()/maxW; if(ratio>1){sG/=ratio;sT/=ratio;sDot/=ratio;}
  let x=cx-tw()/2;
  const place=(ch,s,w=700)=>{const g=gw(ch,s,w);ctx.font=`${w} ${s}px 'Oswald','Arial Narrow',sans-serif`;ctx.fillText(ch,x,baselineY);x+=g+tight;};
  place('G',sG,600); place('.',sDot); place('T',sT); place('.',sDot); place('S',sG,600);
  const divY=baselineY+baseSize*0.34;
  const divHalf=Math.min(halfWidthAt(divY)*0.70,maxW*0.5);
  ctx.strokeStyle='#F5C500'; ctx.lineWidth=Math.max(0.8,W*0.0018);
  ctx.globalAlpha=0.30; ctx.beginPath(); ctx.moveTo(cx-divHalf,divY); ctx.lineTo(cx+divHalf,divY); ctx.stroke();
  ctx.globalAlpha=1;
  const tagY=divY+baseSize*0.30, tagAvail=halfWidthAt(tagY)*0.84*2;
  let tagSize=baseSize*0.165;
  ctx.font=`500 ${tagSize}px 'Oswald',sans-serif`; ctx.letterSpacing=`${tagSize*0.22}px`;
  let tagW=ctx.measureText('GUARD TECH SOLUTIONS').width;
  if(tagW>tagAvail){tagSize*=tagAvail/tagW;ctx.font=`500 ${tagSize}px 'Oswald',sans-serif`;ctx.letterSpacing=`${tagSize*0.22}px`;}
  ctx.globalAlpha=0.80; ctx.textAlign='center';
  ctx.fillText('GUARD TECH SOLUTIONS',cx,tagY+tagSize*0.95);
  ctx.globalAlpha=1; ctx.letterSpacing='0px';
}
(document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve()).then(()=>{
  ['loginLogo','sbLogo'].forEach(id=>{const c=document.getElementById(id);if(c)drawGTSLogo(c);});
  const fc=document.createElement('canvas'); fc.width=64; fc.height=64; drawGTSLogo(fc);
  const fl=document.getElementById('favicon-link'); if(fl){fl.type='image/png'; fl.href=fc.toDataURL('image/png');}
});
